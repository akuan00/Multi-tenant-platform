version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-center-postgres
    environment:
      POSTGRES_DB: ai_center
      POSTGRES_USER: ai_center
      POSTGRES_PASSWORD: ai_center_pwd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_center -d ai_center"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-center-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
