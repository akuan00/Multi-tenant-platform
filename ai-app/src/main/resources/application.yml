server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: ai-center
  profiles:
    active: dev
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:none}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o
      embedding:
        options:
          model: text-embedding-3-small

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [appId=%X{appId}] [traceId=%X{traceId}] - %msg%n"
  level:
    com.company.ai: DEBUG
