spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_center
    username: ai_center
    password: ai_center_pwd
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

oss:
  endpoint: ${OSS_ENDPOINT:https://oss-cn-hangzhou.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID:placeholder}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:placeholder}
  bucket-name: ${OSS_BUCKET_NAME:ai-center}
